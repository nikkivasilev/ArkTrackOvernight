services:
  postgres:
    image: postgres:16
    container_name: bestfactor-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bestfactor
    ports:
      - "5433:5432"
    volumes:
      - bestfactor_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  bestfactor_pgdata:
